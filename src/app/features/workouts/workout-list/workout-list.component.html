<div class="workout-container">
  <div class="header">
  <h1>My Workouts</h1>
  <div class="header-actions">
    <button mat-stroked-button (click)="exportToCSV()">
      <mat-icon>download</mat-icon> CSV
    </button>
    <button mat-stroked-button (click)="exportToPDF()">
      <mat-icon>picture_as_pdf</mat-icon> PDF
    </button>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>add</mat-icon> New Workout
    </button>
  </div>
</div>

  <mat-form-field appearance="outline" class="search-field">
    <mat-label>Search workouts</mat-label>
    <mat-icon matPrefix>search</mat-icon>
    <input matInput (input)="searchTerm.set($any($event.target).value)" placeholder="Push day...">
  </mat-form-field>

  <mat-card>
    <mat-card-content>
      <table mat-table [dataSource]="filteredWorkouts()" class="full-width">

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let w">{{ w.name }}</td>
        </ng-container>

        <ng-container matColumnDef="date">
          <th mat-header-cell *matHeaderCellDef>Date</th>
          <td mat-cell *matCellDef="let w">{{ w.date | date:'mediumDate' }}</td>
        </ng-container>

        <ng-container matColumnDef="notes">
          <th mat-header-cell *matHeaderCellDef>Notes</th>
          <td mat-cell *matCellDef="let w">{{ w.notes }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let w">
            <button mat-icon-button color="accent" (click)="viewDetail(w.id)">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button color="primary" (click)="openDialog(w)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="delete(w.id)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      @if (filteredWorkouts().length === 0) {
        <div class="empty-state">
          <mat-icon>fitness_center</mat-icon>
          <p>No workouts yet. Start your first workout!</p>
          <button mat-raised-button color="primary" (click)="openDialog()">
            Create Workout
          </button>
        </div>
      }


    </mat-card-content>
  </mat-card>
</div>
