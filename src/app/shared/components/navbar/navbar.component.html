<mat-toolbar color="primary">
  <span>💪 Workout Tracker</span>
  <span class="spacer"></span>

  <!-- Desktop links -->
  <div class="nav-links">
    <a mat-button routerLink="/dashboard" routerLinkActive="active-link">
      <mat-icon>dashboard</mat-icon> Dashboard
    </a>
    <a mat-button routerLink="/workouts" routerLinkActive="active-link">
      <mat-icon>fitness_center</mat-icon> Workouts
    </a>
    <a mat-button routerLink="/exercises" routerLinkActive="active-link">
      <mat-icon>list</mat-icon> Exercises
    </a>
    <a mat-button routerLink="/profile" routerLinkActive="active-link">
      <mat-icon>person</mat-icon> Profile
    </a>
    <button mat-button (click)="logout()">
      <mat-icon>logout</mat-icon> Logout
    </button>
  </div>
</mat-toolbar>
